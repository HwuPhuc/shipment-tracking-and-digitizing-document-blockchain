<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Logistics System</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js">
    </script>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            background: #f5f5f5;
        }

        .sidebar {
            width: 220px;
            background: #ff7a00;
            color: #fff;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            margin-top: 0;
        }

        .sidebar button {
            width: 100%;
            margin: 6px 0;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #fff;
            color: #ff7a00;
            font-weight: bold;
        }

        .content {
            flex: 1;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .account {
            background: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .page {
            display: none;
        }

        .active {
            display: block;
        }

        .card {
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button.action {
            width: 100%;
            padding: 10px;
            background: #ff7a00;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .stat {
            display: flex;
            gap: 20px;
        }

        .stat div {
            flex: 1;
            background: #ff7a00;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .shipment-list {
            margin-top: 20px;
        }

        .shipment-item {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .timeline {
            margin-bottom: 10px;
            padding: 10px;
            background: #fff3e6;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>G6 Logistics</h2>
        <button onclick="showPage('connect')">Kết nối contract</button>
        <button onclick="showPage('home')">Trang chủ</button>
        <button onclick="showPage('create')">Tạo đơn hàng</button>
        <button onclick="showPage('document')">Quản lý đơn hàng</button>
        <button onclick="showPage('state')">Quản lý trạng thái</button>
        <button onclick="showPage('query')">Tra cứu</button>
        <button onclick="showPage('participant')">Quản lý người tham gia</button>
    </div>

    <div class="content">

        <div class="header">
            <div class="account">
                <div id="account">Chưa kết nối</div>
                <div id="role">Vai trò: Unknown</div>
            </div>
        </div>

        <div id="home" class="page active">
            <div class="card">
                <h3>📊 Tổng quan</h3>
                <div class="stat">
                    <div>Tổng lô hàng<br /><span id="total">0</span></div>
                    <div>Đang vận chuyển<br /><span id="inTransit">0</span></div>
                    <div>Đã hoàn thành<br /><span id="delivered">0</span></div>
                </div>
            </div>

            <button class="action" onclick="loadStats()">Làm mới</button>

            <div class="shipment-list" id="shipmentList"></div>
        </div>

        <div id="connect" class="page">
            <div class="card">
                <h3>Kết nối</h3>
                <button class="action" onclick="connectWallet()">>Kết nối MetaMask</button>
                <input id="contractAddressInput" placeholder="Contract Address" />
                <button class="action" onclick="connectContract()">>Kết nối Contract</button>
                <p id="contractStatus"></p>
            </div>
        </div>

        <div id="create" class="page">
            <div class="card">
                <h3>Tạo đơn hàng</h3>
                <input id="consignee" placeholder="Consignee address" />
                <button class="action" onclick="createShipment()">Tạo</button>
            </div>
        </div>

        <div id="document" class="page">
            <div class="card">
                <h3>Quản lý chứng từ</h3>
                <input type="file" id="fileInput" />
                <button class="action" onclick="uploadToIPFS()">Tải File lên IPFS</button>
                <input id="shipId" placeholder="Shipment ID" />
                <input id="docType" placeholder="Document Type" />
                <input id="docHash" placeholder="IPFS Hash" />
                <button class="action" onclick="uploadDocument()">Tải</button>
                <br />
                <h3>Phê duyệt chứng từ</h3>
                <input id="approveId" placeholder="Document ID" />
                <button class="action" onclick="approveDocument()">Duyệt</button>
            </div>
        </div>

        <div id="state" class="page">
            <div class="card">
                <h3>Cập nhật trạng thái</h3>
                <input id="stateShipId" placeholder="Shipment ID" />
                <select id="stateSelect">
                    <option value="1">Đã đóng gói</option>
                    <option value="2">Đã nhận hàng</option>
                    <option value="4">Đã rời cửa khẩu</option>
                    <option value="5">Đang vận chuyển</option>
                    <option value="7">Đã qua cửa khẩu</option>
                    <option value="8">Đã nhận hàng</option>
                </select>
                <button class="action" onclick="updateState()">Cập nhật</button>
            </div>
        </div>

        <div id="query" class="page">
            <div class="card">
                <h3>🔍 Tra cứu thông tin lô hàng</h3>
                <input id="queryId" placeholder="Shipment ID" />
                <button class="action" onclick="getShipment()">Tìm kiếm</button>
                <br />
                <div id="result"></div>
            </div>
        </div>
        <div id="participant" class="page">
            <div class="card">
                <h3>👤 Quản lý người tham gia</h3>

                <input id="userAddress" placeholder="Address" />
                <input id="userName" placeholder="Name" />

                <select id="userRole">
                    <option value="1">Shipper</option>
                    <option value="2">Forwarder</option>
                    <option value="3">Carrier</option>
                    <option value="4">Customs</option>
                    <option value="5">Consignee</option>
                </select>

                <button class="action" onclick="addUser()">Thêm người tham gia</button>

                <!-- <br />
                <h3>👤 Vô hiệu hóa người dùng</h3>
                <input id="removeAddress" placeholder="Address to remove" />
                <button class="action" onclick="removeUser()">Vô hiệu hóa</button> -->
            </div>
        </div>
    </div>

    <script>
        let provider, signer, contract;

        const abi = [
            "function createShipment(address)",
            "function uploadDocument(uint256,string,string)",
            "function approveDocument(uint256)",
            "function updateState(uint256,uint8)",
            "function shipments(uint256) view returns (uint256,address,address,uint8,uint256)",
            "function shipmentCounter() view returns (uint256)",
            "function participants(address) view returns (address account, string name, uint8 role, bool isActive)",
            "function shipmentHistory(uint256,uint256) view returns (uint8)",
            "function addParticipant(address,string,uint8)",
            "function deactivateParticipant(address)",
            "function getShipmentDocuments(uint256) view returns (uint256[])",
            "function documents(uint256) view returns (uint256,uint256,string,string,address,bool)"
        ];

        const roleMap = ["Admin", "Shipper", "Forwarder", "Carrier", "Customs", "Consignee"];

        const stateMap = ["Created", "Packed", "PickedUp", "Booked", "ExportCleared", "InTransit", "Arrived", "ImportCleared", "Delivered"];

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function connectWallet() {
            provider = new ethers.BrowserProvider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            const addr = await signer.getAddress();
            document.getElementById("account").innerText = addr;
        }

        async function connectContract() {
            const address = document.getElementById("contractAddressInput").value;
            contract = new ethers.Contract(address, abi, signer);
            document.getElementById("contractStatus").innerText = "Connected";

            const addr = await signer.getAddress();
            try {
                const p = await contract.participants(addr);
                document.getElementById("role").innerText = "Role: " + roleMap[p[2]];
            } catch {
                document.getElementById("role").innerText = "Role: Unknown";
            }
        }

        async function loadStats() {
            const total = Number(await contract.shipmentCounter());
            let delivered = 0, inTransit = 0;
            let html = "";

            for (let i = 1; i <= total; i++) {
                const s = await contract.shipments(i);
                if (s[3] == 8) delivered++;
                if (s[3] == 5) {
                    inTransit++;
                    html += `<div class='shipment-item'>Shipment #${i} - In Transit</div>`;
                }
            }

            document.getElementById("total").innerText = total;
            document.getElementById("delivered").innerText = delivered;
            document.getElementById("inTransit").innerText = inTransit;
            document.getElementById("shipmentList").innerHTML = html;
        }
        async function createShipment() {
            const consignee = document.getElementById("consignee").value;
            const tx = await contract.createShipment(consignee);
            await tx.wait();
            alert("Shipment created!");
        }
        async function getShipment() {
            const id = document.getElementById("queryId").value;

            const s = await contract.shipments(id);

            const shipper = await contract.participants(s[1]);
            const consignee = await contract.participants(s[2]);

            const shipperName = shipper[1] || s[1];
            const consigneeName = consignee[1] || s[2];

            // ===== LẤY HISTORY =====
            let historyHTML = "";
            let i = 0;

            try {
                while (true) {
                    const state = await contract.shipmentHistory(id, i);
                    historyHTML += `<span style="color:#ff7a00;font-weight:bold">
                ${stateMap[state]}
            </span>`;

                    historyHTML += " ➝ ";
                    i++;
                }
            } catch {
                // hết mảng thì dừng
            }

            if (historyHTML === "") {
                historyHTML = "No history yet";
            } else {
                historyHTML = historyHTML.slice(0, -3); // bỏ dấu ➝ cuối
            }

            // ===== HIỂN THỊ =====
            document.getElementById("result").innerHTML = `
                <div class='shipment-item'>

                <div style="margin-bottom:10px">
                    <b>📍 Timeline:</b><br/>
                    ${historyHTML}
                </div>

                <b>ID:</b> ${s[0]}<br/>
                <b>Shipper:</b> ${shipperName}<br/>
                <b>Consignee:</b> ${consigneeName}<br/>
                <b>State:</b> ${stateMap[s[3]]}<br/>
                <b>Created:</b> ${new Date(Number(s[4]) * 1000).toLocaleString()}
                
                </div>
            `;

            const docIds = await contract.getShipmentDocuments(id);

            let docHTML = "";

            for (let i = 0; i < docIds.length; i++) {
                const doc = await contract.documents(docIds[i]);

                docHTML += `
                    <div style="padding:8px;margin-top:5px;border:1px solid #ddd;border-radius:6px">
                        <b>📄 Type:</b> ${doc[2]} <br/>
                        <b>🔗 Hash:</b> ${doc[3]} <br/>
                        <b>👤 Owner:</b> ${doc[4]} <br/>
                        <b>✅ Approved:</b> ${doc[5] ? "Yes" : "No"}
                    </div>
                `;
            }
            document.getElementById("result").innerHTML += `
                <div style="margin-top:15px">
                    <b>📦 Documents:</b>
                    ${docHTML || "No documents"}
                </div>
            `;
        }
        async function uploadDocument() {
            const id = document.getElementById("shipId").value;
            const type = document.getElementById("docType").value;
            const hash = document.getElementById("docHash").value;
            const tx = await contract.uploadDocument(id, type, hash);
            await tx.wait();
            alert("Document uploaded!");
        }

        async function approveDocument() {
            const id = document.getElementById("approveId").value;
            const tx = await contract.approveDocument(id);
            await tx.wait();
            alert("Document approved!");
        }

        async function updateState() {
            const id = document.getElementById("stateShipId").value;
            const state = document.getElementById("stateSelect").value;
            const tx = await contract.updateState(id, state);
            await tx.wait();
            alert("State updated!");
        }
        async function addUser() {
            const addr = document.getElementById("userAddress").value;
            const name = document.getElementById("userName").value;
            const role = document.getElementById("userRole").value;

            const tx = await contract.addParticipant(addr, name, role);
            await tx.wait();
            alert("User added!");
        }

        async function removeUser() {
            const addr = document.getElementById("removeAddress").value;

            const tx = await contract.deactivateParticipant(addr);
            await tx.wait();
            alert("User deactivated!");
        }
        async function uploadToIPFS() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Vui lòng chọn file!");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("https://api.pinata.cloud/pinning/pinFileToIPFS", {
                    method: "POST",
                    headers: {
                        Authorization: `Bearer <JWT_ACCESS_TOKEN>`
                    },
                    body: formData
                });

                const data = await response.json();

                if (!data.IpfsHash) {
                    throw new Error("Upload failed");
                }

                const ipfsHash = data.IpfsHash;

                console.log("IPFS Hash:", ipfsHash);

                // 👉 tự động điền vào input
                document.getElementById("docHash").value = ipfsHash;

                alert("Upload IPFS thành công!");

            } catch (err) {
                console.error(err);
                alert("Upload IPFS thất bại!");
            }
        }
    </script>

</body>

</html>
